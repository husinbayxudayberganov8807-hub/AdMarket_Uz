<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdMarket Uz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #050a18; /* Sizning logodagi to'q ko'k */
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .balance { background: #0f172a; padding: 10px; border-radius: 10px; border: 1px solid #00d2ff; }
        
        .main-btn {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .main-btn:active { border-color: #00d2ff; transform: scale(0.98); }
        
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0a1120;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>
    <div class="header">
        <b style="color: #00d2ff;">ADMARKET UZ</b>
        <div class="balance">💎 0 | 🪙 0</div>
    </div>

    <div class="main-btn">
        <span>🚀 Telegram Boost</span>
        <span>➜</span>
    </div>
    <div class="main-btn">
        <span>📸 Instagram Boost</span>
        <span>➜</span>
    </div>

    <div class="footer">
        <span style="color: #00d2ff;">🚀 Boost</span>
        <span>💎 Ishlash</span>
        <span>👤 Profil</span>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ilovani to'liq ochish
    </script>
</body>
</html>
