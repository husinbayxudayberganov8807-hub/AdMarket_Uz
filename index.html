<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdMarket Uz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* SIZGA YOQQAN ODDIY DIZAYN */
        body { 
            background-color: #050a18; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 15px; 
            text-align: center; 
        }

        .balance-section {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .diamond-count {
            font-size: 40px;
            font-weight: bold;
            color: #00d2ff;
        }

        /* Sahifalar */
        .page { display: none; }
        .active { display: block; }

        /* Tugmalar uslubi */
        .main-btn {
            background: #0f172a;
            color: white;
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Vazifa kartochkasi */
        .task-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border: 1px solid #1e293b;
        }

        /* Kirish maydonlari */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #1e293b;
            background: #0b1120;
            color: white;
            box-sizing: border-box;
        }

        /* Pastki menyu - SODDA */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }
        .nav-item {
            flex: 1;
            padding: 15px;
            color: #64748b;
        }
        .nav-item.selected {
            color: #00d2ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="balance-section">
        <div class="diamond-count">💎 <span id="main-bal">0</span></div>
        <p>Sizning balansingiz</p>
    </div>

    <div id="page-tasks" class="page active">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="main-btn" style="margin-bottom:0;" onclick="showTab('mavjud')">Mavjud</button>
            <button class="main-btn" style="margin-bottom:0;" onclick="showTab('yaratish')">Yaratish</button>
        </div>

        <div id="tab-mavjud">
            <div class="task-card">
                <div style="text-align: left;">
                    <b>@AdMarket_Uz</b><br>
                    <small style="color: #00ff00;">+10 olmos</small>
                </div>
                <button onclick="window.location.href='https://t.me/AdMarket_Uz'" style="background:#00d2ff; border:none; padding:8px 15px; border-radius:5px;">O'tish</button>
            </div>
        </div>

        <div id="tab-yaratish" style="display: none; text-align: left;">
            <label>Kanal linki:</label>
            <input type="text" id="task-link" placeholder="@kanal_nomi">
            <label>Odam soni:</label>
            <input type="number" id="task-count" placeholder="Masalan: 30" oninput="calculate()">
            <p>Jami: <span id="res-price" style="color:#00d2ff;">0</span> 💎</p>
            <button class="main-btn" style="background: #00ff00; color: black; font-weight: bold;" onclick="submitTask()">YUBORISH</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div style="background: #0f172a; padding: 20px; border-radius: 15px; text-align: left;">
            <h2 id="u-name">Foydalanuvchi</h2>
            <p id="u-id" style="color: #64748b;">ID: 000000</p>
            <hr style="border: 0.1px solid #1e293b;">
            <button class="main-btn" style="background: #00d2ff; color: black; margin-top: 10px;" onclick="inviteFriend()">Do'stlarni taklif qilish (+80 💎)</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item selected" id="nav-t" onclick="changePage('page-tasks', 'nav-t')">Vazifalar</div>
        <div class="nav-item" id="nav-p" onclick="changePage('page-profile', 'nav-p')">Profil</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let currentBal = urlParams.get('bal') || 0;
        document.getElementById('main-bal').innerText = currentBal;
        document.getElementById('u-name').innerText = tg.initDataUnsafe.user?.first_name || "User";
        document.getElementById('u-id').innerText = "ID: " + tg.initDataUnsafe.user?.id;

        function changePage(pageId, navId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('selected'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById(navId).classList.add('selected');
        }

        function showTab(tab) {
            document.getElementById('tab-mavjud').style.display = tab === 'mavjud' ? 'block' : 'none';
            document.getElementById('tab-yaratish').style.display = tab === 'yaratish' ? 'block' : 'none';
        }

        function calculate() {
            let count = document.getElementById('task-count').value;
            document.getElementById('res-price').innerText = count * 5;
        }

        function submitTask() {
            let link = document.getElementById('task-link').value;
            let count = document.getElementById('task-count').value;
            let price = count * 5;
            if(price > currentBal) { tg.showAlert("Olmosingiz yetarli emas!"); return; }
            tg.sendData(JSON.stringify({link: link, count: count, price: price}));
        }

        function inviteFriend() {
            let id = tg.initDataUnsafe.user.id;
            let link = "https://t.me/AdMarket_Uzbot?start=" + id;
            tg.openTelegramLink("https://t.me/share/url?url=" + encodeURIComponent(link) + "&text=Olmos yig'ing!");
        }
    </script>
</body>
</html>
