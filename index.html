<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdMarket Uz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #050a18;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 15px;
            padding-bottom: 80px; /* Footer uchun joy */
            text-align: center;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .balance { 
            background: #0f172a; padding: 8px 15px; border-radius: 20px; 
            border: 1px solid #00d2ff; font-weight: bold; font-size: 14px;
        }
        .section-title { text-align: left; font-size: 14px; color: #64748b; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Sahifalar boshqaruvi */
        .page { display: none; }
        .page.active { display: block; }

        /* Vazifa kartochkalari */
        .task-card {
            background: #0f172a; border: 1px solid #1e293b; border-radius: 15px;
            padding: 15px; margin-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .task-info { text-align: left; }
        .task-name { display: block; font-weight: bold; font-size: 15px; }
        .task-reward { color: #00ff00; font-size: 13px; }

        /* Yaratish formasi (Inputlar) */
        .input-box {
            width: 100%; background: #0b1120; border: 1px solid #1e293b;
            padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px;
            box-sizing: border-box; text-align: left;
        }
        .btn-submit {
            width: 100%; background: #00ff00; color: black; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        /* Footer */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0a1120; display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #1e293b;
        }
        .nav-item { font-size: 12px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: #00d2ff; }
        
        .invite-banner {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 15px; padding: 20px; margin-bottom: 25px;
            color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <b style="color: #00d2ff; font-size: 18px;">ADMARKET UZ</b>
        <div class="balance">💎 <span id="diamond-count">0</span></div>
    </div>

    <div id="vazifalar-page" class="page active">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button onclick="switchTab('mavjud')" id="tab-m" style="flex:1; padding:10px; border-radius:10px; background:#00d2ff; color:black; border:none; font-weight:bold;">Mavjud</button>
            <button onclick="switchTab('yaratish')" id="tab-y" style="flex:1; padding:10px; border-radius:10px; background:#0f172a; color:white; border:1px solid #1e293b;">Yaratish</button>
        </div>

        <div id="mavjud-list">
            <div class="section-title">Kunlik Vazifalar</div>
            <div class="task-card" onclick="openLink('https://t.me/AdMarket_Uz')">
                <div class="task-info">
                    <span class="task-name">📢 Kanalga a'zo bo'lish</span>
                    <span class="task-reward">+10 olmos</span>
                </div>
                <span>➜</span>
            </div>
        </div>

        <div id="yaratish-form" style="display: none; text-align: left;">
            <div class="section-title">Reklama yaratish</div>
            <label style="font-size: 12px; color: #64748b;">Kanal linki (@username)</label>
            <input type="text" id="c-link" class="input-box" placeholder="@kanal">
            
            <label style="font-size: 12px; color: #64748b;">Odam soni</label>
            <input type="number" id="c-count" class="input-box" placeholder="30" oninput="recalc()">
            
            <p style="font-size: 16px;">Jami narx: <span id="total-price" style="color:#00d2ff; font-weight:bold;">0</span> 💎</p>
            <button class="btn-submit" onclick="sendTask()">YUBORISH</button>
        </div>
    </div>

    <div id="profil-page" class="page">
        <div class="invite-banner" onclick="shareInvite()">
            🚀 DO'STLARNI TAKLIF QILISH<br>
            <span style="font-size: 12px;">Har bir do'st uchun +80 💎 Do'stinggizga +30 💎</span>
        </div>
        
        <div style="background: #0f172a; padding: 20px; border-radius: 15px; border: 1px solid #1e293b; text-align: left;">
            <p id="u-name" style="font-size: 18px; font-weight: bold; margin: 0;"></p>
            <p id="u-id" style="color: #64748b; font-size: 14px; margin: 5px 0 15px 0;"></p>
            <hr style="border: 0.1px solid #1e293b;">
            <p style="font-size: 16px;">Sizning balansingiz: <span style="color: #00d2ff; font-weight: bold;"><span id="p-bal">0</span> 💎</span></p>
        </div>
    </div>

    <div class="footer">
        <div class="nav-item active" id="nav-v" onclick="showPage('vazifalar-page', 'nav-v')">📋<br>Vazifalar</div>
        <div class="nav-item" id="nav-p" onclick="showPage('profil-page', 'nav-p')">👤<br>Profil</div>
    </div>
    
<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    let balance = parseInt(urlParams.get('bal')) || 0;
    
    // Ma'lumotlarni yangilash
    document.getElementById("diamond-count").innerText = balance;
    document.getElementById("p-bal").innerText = balance;
    document.getElementById("u-name").innerText = tg.initDataUnsafe.user?.first_name || "Foydalanuvchi";
    document.getElementById("u-id").innerText = "ID: " + (tg.initDataUnsafe.user?.id || "000000");

    function showPage(pageId, navId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById(navId).classList.add('active');
    }

    function switchTab(type) {
        if(type === 'mavjud') {
            document.getElementById('mavjud-list').style.display = 'block';
            document.getElementById('yaratish-form').style.display = 'none';
            document.getElementById('tab-m').style.background = '#00d2ff';
            document.getElementById('tab-m').style.color = 'black';
            document.getElementById('tab-y').style.background = '#0f172a';
            document.getElementById('tab-y').style.color = 'white';
        } else {
            document.getElementById('mavjud-list').style.display = 'none';
            document.getElementById('yaratish-form').style.display = 'block';
            document.getElementById('tab-y').style.background = '#00d2ff';
            document.getElementById('tab-y').style.color = 'black';
            document.getElementById('tab-m').style.background = '#0f172a';
            document.getElementById('tab-m').style.color = 'white';
        }
    }

    function recalc() {
        let count = document.getElementById('c-count').value;
        document.getElementById('total-price').innerText = count * 5;
    }

    function sendTask() {
        let link = document.getElementById('c-link').value;
        let count = document.getElementById('c-count').value;
        let total = count * 5;
        if(total > balance) { tg.showAlert("Olmosingiz yetarli emas!"); return; }
        tg.sendData(JSON.stringify({action: "create", link: link, count: count, price: total}));
    }

    function openLink(url) {
        tg.openTelegramLink(url);
        tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert("Kanalga a'zo bo'ling va botga qaytib /start bosing!");
    }
    
    function shareInvite() {
        let userId = tg.initDataUnsafe.user.id;
        let inviteLink = "https://t.me/AdMarket_Uzbot?start=" + userId;
        let shareUrl = "https://t.me/share/url?url=" + encodeURIComponent(inviteLink) + "&text=Olmos yig'ing!";
        tg.openTelegramLink(shareUrl);
    }
</script>
</body>
</html>
