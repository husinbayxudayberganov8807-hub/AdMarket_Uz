<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdMarket Uz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Eng birinchi holatdagi oddiy dizayn */
        body { background-color: #050a18; color: white; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .balance-box { background: #0f172a; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #1e293b; }
        .diamond-count { font-size: 32px; font-weight: bold; color: #00d2ff; }
        
        /* Vazifalar bo'limi (Mavjud va Yaratish) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: #0f172a; color: white; border: 1px solid #1e293b; border-radius: 8px; }
        .tab-btn.active { background: #00d2ff; color: black; }

        .content { display: none; }
        .content.active { display: block; }

        /* Vazifa kartochkasi */
        .task-card { background: #0f172a; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #1e293b; }
        .btn-go { background: #00d2ff; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }

        /* Yaratish formasi */
        .form-group { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0b1120; color: white; box-sizing: border-box; }
        .btn-send { width: 100%; background: #00ff00; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; }

        /* Profil */
        .profile-card { background: #0f172a; padding: 20px; border-radius: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="balance-box">
        <div class="diamond-count">💎 <span id="bal-display">0</span></div>
        <p style="margin: 5px 0; color: #64748b;">Sizning olmoslaringiz</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPage('tasks-page', this)">Vazifalar</button>
        <button class="tab-btn" onclick="showPage('profile-page', this)">Profil</button>
    </div>

    <div id="tasks-page" class="content active">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button onclick="showSubTab('mavjud')" style="flex:1;">Mavjud</button>
            <button onclick="showSubTab('yaratish')" style="flex:1;">Yaratish</button>
        </div>

        <div id="mavjud-box">
            <div class="task-card">
                <div><b>@AdMarket_Uz</b><br><small>+10 💎</small></div>
                <button class="btn-go" onclick="window.location.href='https://t.me/AdMarket_Uz'">O'tish</button>
            </div>
        </div>

        <div id="yaratish-box" style="display:none;">
            <div class="form-group">
                <label>Kanal nomi (@username):</label>
                <input type="text" id="inp-link" placeholder="@kanal">
            </div>
            <div class="form-group">
                <label>Nechta odam kerak?</label>
                <input type="number" id="inp-count" oninput="calc()">
            </div>
            <p>Narxi: <span id="out-price">0</span> 💎</p>
            <button class="btn-send" onclick="submit()">YUBORISH</button>
        </div>
    </div>

    <div id="profile-page" class="content">
        <div class="profile-card">
            <h2 id="u-name">Ism</h2>
            <p id="u-id">ID: 00000</p>
            <button onclick="inv()" style="width:100%; padding:10px; background:#00d2ff; border:none; border-radius:8px;">Do'stlarni taklif qilish (+80 💎)</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const p = new URLSearchParams(window.location.search);
        let b = p.get('bal') || 0;

        document.getElementById('bal-display').innerText = b;
        document.getElementById('u-name').innerText = tg.initDataUnsafe.user?.first_name;
        document.getElementById('u-id').innerText = "ID: " + tg.initDataUnsafe.user?.id;

        function showPage(id, btn) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function showSubTab(t) {
            document.getElementById('mavjud-box').style.display = t=='mavjud'?'block':'none';
            document.getElementById('yaratish-box').style.display = t=='yaratish'?'block':'none';
        }

        function calc() {
            let n = document.getElementById('inp-count').value;
            document.getElementById('out-price').innerText = n * 5;
        }

        function submit() {
            let l = document.getElementById('inp-link').value;
            let n = document.getElementById('inp-count').value;
            if(n*5 > b) { tg.showAlert("Olmos yetmaydi!"); return; }
            tg.sendData(JSON.stringify({link:l, count:n, price:n*5}));
        }

        function inv() {
            let link = "https://t.me/AdMarket_Uzbot?start=" + tg.initDataUnsafe.user.id;
            tg.openTelegramLink("https://t.me/share/url?url="+encodeURIComponent(link));
        }
    </script>
</body>
</html>
